<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecodeLabs | The Nervous System (Best Version)</title>
    <style>
        /* --- CORE VARIABLES & RESET --- */
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --font-main: 'Inter', system-ui, sans-serif;
            --font-mono: 'Fira Code', 'Consolas', monospace;
            --border: #334155;
            --glow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- HEADER --- */
        header {
            height: 60px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: rgba(15, 23, 42, 0.95);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            letter-spacing: -0.5px;
            font-size: 1.1rem;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--success);
            background: rgba(16, 185, 129, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 0 rgba(16, 185, 129, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .nav-tabs {
            display: flex;
            gap: 4px;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.9rem;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .nav-btn:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }
        .nav-btn.active { background: var(--bg-card); color: var(--primary); font-weight: 600; }

        /* --- MAIN LAYOUT --- */
        .workspace {
            display: grid;
            grid-template-columns: 320px 1fr;
            grid-template-rows: 1fr 180px;
            flex: 1;
            overflow: hidden;
        }

        /* PANEL: FORM (Left) */
        .panel-form {
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            padding: 24px;
            overflow-y: auto;
            grid-row: 1 / 2;
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .input-group { margin-bottom: 16px; }
        
        label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        input, select {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: white;
            padding: 10px;
            border-radius: 6px;
            font-family: var(--font-main);
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover { background: var(--primary-hover); box-shadow: var(--glow); }

        /* PANEL: DATA (Right Top) */
        .panel-data {
            padding: 24px;
            overflow-y: auto;
        }

        .data-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }
        
        th {
            text-align: left;
            padding: 12px 16px;
            background: rgba(0,0,0,0.2);
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
            color: var(--text-main);
        }

        tr:last-child td { border-bottom: none; }
        tr:hover { background: rgba(255,255,255,0.02); }

        .badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-eng { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .badge-des { background: rgba(236, 72, 153, 0.2); color: #f472b6; }
        .badge-mkt { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }

        .actions { display: flex; gap: 8px; }
        
        .icon-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .icon-btn.delete:hover { border-color: var(--danger); color: var(--danger); }

        /* PANEL: LOGS (Bottom) */
        .panel-logs {
            grid-column: 1 / -1;
            background: #0b1120;
            border-top: 1px solid var(--border);
            padding: 0;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            overflow-y: auto;
        }

        .logs-header {
            padding: 8px 16px;
            background: #1e293b;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
        }

        .log-entry {
            padding: 6px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            gap: 16px;
            color: var(--text-muted);
        }
        .log-entry span.method { color: var(--primary); width: 50px; }
        .log-entry span.path { color: var(--text-main); }
        .log-entry span.status { color: var(--success); }
        .log-entry span.time { margin-left: auto; opacity: 0.5; }

        /* MODAL / CODE VIEW */
        .code-view {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .code-view.active { display: flex; }

        .code-container {
            background: var(--bg-card);
            width: 90%;
            max-width: 1000px;
            height: 80vh;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .code-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .code-tabs { display: flex; gap: 4px; }
        .code-tab {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
        }
        .code-tab.active { background: rgba(59, 130, 246, 0.1); color: var(--primary); }

        .code-content { flex: 1; padding: 0; overflow: auto; position: relative; }
        pre {
            margin: 0;
            padding: 20px;
            color: #e2e8f0;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        .close-btn { font-size: 1.5rem; background: none; border: none; color: white; cursor: pointer; }

        /* SYNTAX HIGHLIGHTING */
        .c-kw { color: #c678dd; } /* keyword */
        .c-st { color: #98c379; } /* string */
        .c-fn { color: #61afef; } /* function */
        .c-nu { color: #d19a66; } /* number */
        .c-cm { color: #5c6370; font-style: italic; } /* comment */
        .c-op { color: #56b6c2; } /* operator */

    </style>
</head>
<body>

    <header>
        <div class="brand">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="text-blue-500"><path stroke-linecap="round" stroke-linejoin="round" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
            DecodeLabs OS
        </div>
        <div class="nav-tabs">
            <button class="nav-btn active" onclick="switchView('app')">Dashboard</button>
            <button class="nav-btn" onclick="toggleCodeModal()">Source Code</button>
        </div>
        <div class="status-indicator">
            <div class="pulse"></div>
            API Connected
        </div>
    </header>

    <div class="workspace" id="appView">
        <!-- FORM PANEL -->
        <aside class="panel-form">
            <div class="section-title">Node Configuration</div>
            <form id="nodeForm">
                <input type="hidden" id="editId">
                <div class="input-group">
                    <label>Agent Name</label>
                    <input type="text" id="name" placeholder="e.g. Sarah Connor" required>
                </div>
                <div class="input-group">
                    <label>Department</label>
                    <select id="department" required>
                        <option value="Engineering">Engineering</option>
                        <option value="Design">Design</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Operations">Operations</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Role</label>
                    <input type="text" id="role" placeholder="e.g. System Architect" required>
                </div>
                <div class="input-group">
                    <label>Clearance Level (Salary)</label>
                    <input type="number" id="salary" placeholder="e.g. 90000" required>
                </div>
                <button type="submit" class="btn-primary" id="saveBtn">
                    <span>Initialize Node</span>
                </button>
                <button type="button" id="cancelBtn" style="width:100%; margin-top:10px; background:transparent; border:1px solid var(--border); color:var(--text-muted); padding:10px; border-radius:6px; cursor:pointer; display:none;" onclick="resetForm()">Cancel Update</button>
            </form>
        </aside>

        <!-- DATA PANEL -->
        <section class="panel-data">
            <div class="section-title" style="margin-bottom: 16px;">Active Network Nodes</div>
            <div class="data-card">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Department</th>
                            <th>Role</th>
                            <th>Clearance</th>
                            <th style="text-align:right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- LOGS PANEL -->
        <section class="panel-logs">
            <div class="logs-header">
                <span>SYSTEM CONSOLE / NETWORK MONITOR</span>
                <span>Live Stream</span>
            </div>
            <div id="logsContainer">
                <!-- Logs go here -->
            </div>
        </section>
    </div>

    <!-- SOURCE CODE MODAL -->
    <div class="code-view" id="codeModal">
        <div class="code-container">
            <div class="code-header">
                <div class="code-tabs">
                    <button class="code-tab active" onclick="showCode('server')">server.js</button>
                    <button class="code-tab" onclick="showCode('controller')">controller.js</button>
                    <button class="code-tab" onclick="showCode('model')">model.js</button>
                    <button class="code-tab" onclick="showCode('routes')">routes.js</button>
                </div>
                <button class="close-btn" onclick="toggleCodeModal()">×</button>
            </div>
            <div class="code-content">
                <pre><code id="codeDisplay"></code></pre>
            </div>
        </div>
    </div>

    <script>
        /* -------------------------------------------------------------------------- */
        /*                                 MOCK DB                                    */
        /* -------------------------------------------------------------------------- */
        const DB = [
            { _id: '101', name: 'Elliot Alderson', department: 'Engineering', role: 'Security Engineer', salary: 85000 },
            { _id: '102', name: 'Angela Moss', department: 'Marketing', role: 'PR Director', salary: 95000 },
            { _id: '103', name: 'Tyrell Wellick', department: 'Operations', role: 'CTO', salary: 150000 }
        ];

        /* -------------------------------------------------------------------------- */
        /*                              SYSTEM LOGGER                                 */
        /* -------------------------------------------------------------------------- */
        const logsContainer = document.getElementById('logsContainer');

        function log(method, path, status, duration) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: "numeric", minute: "numeric", second: "numeric" }) + `.${Math.floor(Math.random() * 999)}`;
            
            entry.innerHTML = `
                <span class="method">${method}</span>
                <span class="path">${path}</span>
                <span class="status">${status}</span>
                <span class="time">${duration}ms</span>
                <span class="time">${time}</span>
            `;
            logsContainer.insertBefore(entry, logsContainer.firstChild);
        }

        /* -------------------------------------------------------------------------- */
        /*                                MOCK API                                    */
        /* -------------------------------------------------------------------------- */
        class MockServer {
            constructor() {
                this.latency = () => Math.floor(Math.random() * 400) + 100;
            }

            async get() {
                const start = performance.now();
                await new Promise(r => setTimeout(r, this.latency()));
                const end = performance.now();
                log('GET', '/api/employees', '200 OK', Math.round(end - start));
                return JSON.parse(JSON.stringify(DB));
            }

            async post(data) {
                const start = performance.now();
                await new Promise(r => setTimeout(r, this.latency()));
                const end = performance.now();
                const newDoc = { ...data, _id: Math.random().toString(36).substr(2, 9) };
                DB.push(newDoc);
                log('POST', '/api/employees', '201 Created', Math.round(end - start));
                return newDoc;
            }

            async put(id, data) {
                const start = performance.now();
                await new Promise(r => setTimeout(r, this.latency()));
                const end = performance.now();
                const idx = DB.findIndex(d => d._id === id);
                if (idx > -1) {
                    DB[idx] = { ...DB[idx], ...data };
                    log('PUT', `/api/employees/${id}`, '200 OK', Math.round(end - start));
                    return DB[idx];
                }
                return null;
            }

            async delete(id) {
                const start = performance.now();
                await new Promise(r => setTimeout(r, this.latency()));
                const end = performance.now();
                const idx = DB.findIndex(d => d._id === id);
                if (idx > -1) {
                    DB.splice(idx, 1);
                    log('DELETE', `/api/employees/${id}`, '204 No Content', Math.round(end - start));
                    return true;
                }
                return false;
            }
        }

        const API = new MockServer();

        /* -------------------------------------------------------------------------- */
        /*                               FRONTEND UI                                  */
        /* -------------------------------------------------------------------------- */
        const tableBody = document.getElementById('tableBody');
        const form = document.getElementById('nodeForm');
        const cancelBtn = document.getElementById('cancelBtn');
        const saveBtn = document.getElementById('saveBtn');

        function getBadgeClass(dept) {
            if (dept === 'Engineering') return 'badge-eng';
            if (dept === 'Design') return 'badge-des';
            return 'badge-mkt';
        }

        async function renderTable() {
            const data = await API.get();
            tableBody.innerHTML = '';
            if (data.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding: 2rem; color: var(--text-muted)">No Active Nodes Found</td></tr>`;
                return;
            }
            data.forEach(node => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight:500; color: white;">${node.name}</td>
                    <td><span class="badge ${getBadgeClass(node.department)}">${node.department}</span></td>
                    <td style="color: var(--text-muted)">${node.role}</td>
                    <td>$${parseInt(node.salary).toLocaleString()}</td>
                    <td style="text-align:right">
                        <div class="actions" style="justify-content: flex-end;">
                            <button class="icon-btn" onclick="editNode('${node._id}')">Edit</button>
                            <button class="icon-btn delete" onclick="deleteNode('${node._id}')">Drop</button>
                        </div>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const payload = {
                name: document.getElementById('name').value,
                department: document.getElementById('department').value,
                role: document.getElementById('role').value,
                salary: document.getElementById('salary').value
            };

            saveBtn.disabled = true;
            saveBtn.innerHTML = 'Processing...';

            if (id) {
                await API.put(id, payload);
            } else {
                await API.post(payload);
            }

            saveBtn.disabled = false;
            saveBtn.innerHTML = '<span>Initialize Node</span>';
            resetForm();
            renderTable();
        });

        window.editNode = function(id) {
            const node = DB.find(n => n._id === id);
            if (!node) return;
            document.getElementById('editId').value = node._id;
            document.getElementById('name').value = node.name;
            document.getElementById('department').value = node.department;
            document.getElementById('role').value = node.role;
            document.getElementById('salary').value = node.salary;
            
            saveBtn.innerHTML = 'Update Node';
            cancelBtn.style.display = 'block';
        };

        window.deleteNode = async function(id) {
            if (!confirm('Confirm termination of node connection?')) return;
            await API.delete(id);
            renderTable();
        };

        function resetForm() {
            form.reset();
            document.getElementById('editId').value = '';
            saveBtn.innerHTML = 'Initialize Node';
            cancelBtn.style.display = 'none';
        }

        /* -------------------------------------------------------------------------- */
        /*                              CODE MODAL                                   */
        /* -------------------------------------------------------------------------- */
        const codeData = {
            server: `// server.js - Entry Point
const express = require('express');
const mongoose = require('mongoose');
const cors = require('cors');
require('dotenv').config();

const app = express();

// Middleware
app.use(cors());
app.use(express.json());

// Database Connection
mongoose.connect(process.env.MONGO_URI)
  .then(() => console.log('✅ MongoDB Connected'))
  .catch(err => console.error('❌ Connection Failed:', err));

// Routes
app.use('/api/employees', require('./routes/employeeRoutes'));

const PORT = process.env.PORT || 5000;
app.listen(PORT, () => console.log(\`🚀 Server running on port \${PORT}\`));`,

            controller: `// controllers/employeeController.js - Business Logic
const Employee = require('../models/Employee');

exports.getEmployees = async (req, res) => {
  try {
    const employees = await Employee.find();
    res.json(employees);
  } catch (err) {
    res.status(500).json({ message: err.message });
  }
};

exports.createEmployee = async (req, res) => {
  try {
    const employee = new Employee(req.body);
    const saved = await employee.save();
    res.status(201).json(saved);
  } catch (err) {
    res.status(400).json({ message: err.message });
  }
};

exports.updateEmployee = async (req, res) => {
  try {
    const updated = await Employee.findByIdAndUpdate(
      req.params.id, 
      req.body, 
      { new: true }
    );
    res.json(updated);
  } catch (err) {
    res.status(400).json({ message: err.message });
  }
};

exports.deleteEmployee = async (req, res) => {
  try {
    await Employee.findByIdAndDelete(req.params.id);
    res.json({ message: 'Node removed' });
  } catch (err) {
    res.status(500).json({ message: err.message });
  }
};`,

            model: `// models/Employee.js - Data Schema
const mongoose = require('mongoose');

const EmployeeSchema = new mongoose.Schema({
  name: {
    type: String,
    required: [true, 'Name is required']
  },
  department: {
    type: String,
    required: true,
    enum: ['Engineering', 'Design', 'Marketing', 'Operations']
  },
  role: {
    type: String,
    required: true
  },
  salary: {
    type: Number,
    required: true
  }
}, { timestamps: true });

module.exports = mongoose.model('Employee', EmployeeSchema);`,

            routes: `// routes/employeeRoutes.js - API Endpoints
const express = require('express');
const router = express.Router();
const {
  getEmployees,
  createEmployee,
  updateEmployee,
  deleteEmployee
} = require('../controllers/employeeController');

// Route Mapping
router.route('/').get(getEmployees).post(createEmployee);
router.route('/:id').put(updateEmployee).delete(deleteEmployee);

module.exports = router;`
        };

        let activeCodeType = 'server';

        function showCode(type) {
            activeCodeType = type;
            document.querySelectorAll('.code-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            const raw = codeData[type];
            const highlighted = syntaxHighlight(raw);
            document.getElementById('codeDisplay').innerHTML = highlighted;
        }

        function syntaxHighlight(code) {
            return code
                .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                .replace(/(\/\/.*)/g, '<span class="c-cm">$1</span>')
                .replace(/\b(const|let|var|require|exports|return|function|async|await|try|catch|new|this|module)\b/g, '<span class="c-kw">$1</span>')
                .replace(/\b(app|express|mongoose|res|req|console|process|Error)\b/g, '<span class="c-fn">$1</span>')
                .replace(/(['"`].*?['"`])/g, '<span class="c-st">$1</span>')
                .replace(/\b(\d+)\b/g, '<span class="c-nu">$1</span>');
        }

        function toggleCodeModal() {
            const modal = document.getElementById('codeModal');
            modal.classList.toggle('active');
            if(modal.classList.contains('active')) {
                showCode('server'); // Reset to first tab
            }
        }

        // Initialize
        renderTable();
        
        // Close modal on click outside
        document.getElementById('codeModal').addEventListener('click', (e) => {
            if (e.target.id === 'codeModal') toggleCodeModal();
        });

    </script>
</body>
</html>
